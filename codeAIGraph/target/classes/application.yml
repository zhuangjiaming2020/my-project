server:
  port: 8080

spring:
  application:
    name: mall-customer-service

  # ================================================================
  # DeepSeek 模型配置
  # API Key 获取地址：https://platform.deepseek.com/
  # ================================================================
  ai:
    deepseek:
      # 方式1：直接填写（本地测试用，不要提交到 Git）
      # api-key: sk-your-deepseek-api-key-here
      # 方式2：读取环境变量（推荐，生产使用）
      api-key: sk-06acd8502f7640e5b5781aa7185da91d
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash       # 或 deepseek-reasoner（深度推理）
          temperature: 0.3           # 降低随机性，保证客服回答稳定
          max-tokens: 1024

# ================================================================
# 日志配置
# ================================================================
logging:
  level:
    root: INFO
    com.example.mallcs: DEBUG          # 业务代码 DEBUG 级别，查看 Graph 节点执行日志
    com.alibaba.cloud.ai.graph: INFO   # Graph 框架日志
    org.springframework.ai: INFO       # Spring AI 日志
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
