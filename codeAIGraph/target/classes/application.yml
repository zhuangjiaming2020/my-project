server:
  port: 8080

spring:
  application:
    name: mall-customer-service

  # LocalDateTime 序列化为 ISO 字符串（而非数组），前端可直接 new Date(str)
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # ================================================================
  # PostgreSQL 数据源配置
  # ================================================================
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ================================================================
  # SQL 初始化（建表 + 初始数据）
  # ================================================================
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql

  # ================================================================
  # DeepSeek 模型配置
  # ================================================================
  ai:
    deepseek:
      api-key: sk-06acd8502f7640e5b5781aa7185da91d
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.3
          max-tokens: 1024

# ================================================================
# MyBatis 配置
# ================================================================
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.mallcs.entity
  type-handlers-package: com.example.mallcs.typehandler
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

# ================================================================
# JWT 配置
# ================================================================
jwt:
  secret: mall-cs-jwt-secret-key-2024-must-be-at-least-32-characters-long
  expiration: 86400000   # 24 小时（毫秒）

# ================================================================
# 日志配置
# ================================================================
logging:
  level:
    root: INFO
    com.example.mallcs: DEBUG
    com.alibaba.cloud.ai.graph: INFO
    org.springframework.ai: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
